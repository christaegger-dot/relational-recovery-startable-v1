    <!--
      Audit 25 / Sprint 3: Webfonts sind self-hosted (public/fonts/).
      Preload des Hero-Cuts (Source Serif 4 Regular + Italic) priorisiert
      den LCP-Text ueber dem ersten Paint. Manrope wird nicht vorgeladen
      (Body-Copy toleriert Fallback-FOFT 80-150ms gut; Preload-Budget
      fuer 3 Fonts waere zuviel). font-display: swap in fonts.css tauscht
      die Fonts sanft aus, sobald sie geladen sind; Fallback-Stack
      (Georgia / ui-sans-serif) rendert sofort.
    -->
    <link
      rel="preload"
      href="/fonts/source-serif-4-latin-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/source-serif-4-latin-italic-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
